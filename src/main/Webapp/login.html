<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 备忘录</title>
    <link rel="stylesheet" href="css/login.css">
    <style>
        .page-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 9999;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #8BC34A;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .page-loading p {
            color: #8BC34A;
            font-size: 18px;
            font-weight: bold;
            margin: 0;
        }
    </style>
</head>
<body>
<div id="app">
    <div v-if="!pageLoaded" class="page-loading">
        <div class="loading-spinner"></div>
        <p>加载中...</p>
    </div>
    <div v-show="pageLoaded">
    <div id="loginDiv">
        <div class="title-wrapper">
            <img src="imgs/title.jpg" alt="title" class="title-img">
        </div>
        <h1 id="loginMsg">登录</h1>
        
        <div class="login-tabs">
            <div class="login-tab" :class="{ active: loginType === 'password' }" @click="loginType = 'password'">
                密码登录
            </div>
            <div class="login-tab" :class="{ active: loginType === 'code' }" @click="loginType = 'code'">
                验证码登录
            </div>
        </div>

        <div class="form-group">
            <input v-model="loginForm.phone" type="text" placeholder="手机号" id="phone" name="phone" autocomplete="tel">
        </div>

        <div v-if="loginType === 'password'" class="form-group">
            <input v-model="loginForm.password" type="password" placeholder="密码" id="password" name="password" autocomplete="current-password">
        </div>

        <div v-if="loginType === 'code'" class="form-group code-group">
            <input v-model="loginForm.code" type="text" placeholder="验证码" id="code" name="code" autocomplete="one-time-code">
            <button class="send-code-btn" @click="sendCode" :disabled="countdown > 0">
                {{ countdown > 0 ? countdown + 's' : '发送验证码' }}
            </button>
        </div>

        <div id="subDiv">
            <button @click="handleLogin" class="button">登录</button>
            <a href="register.html">没有账号?点击注册!</a>
        </div>
    </div>
    </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
        setup() {
            const loginType = ref('password');
            const loginForm = ref({
                phone: '',
                password: '',
                code: ''
            });
            const countdown = ref(0);
            const pageLoaded = ref(false);
            let timer = null;

            const sendCode = async () => {
                if (!loginForm.value.phone || !/^1[3-9]\d{9}$/.test(loginForm.value.phone)) {
                    alert('请输入正确的手机号');
                    return;
                }

                try {
                    const response = await axios.get('/login/code', {
                        params: { phone: loginForm.value.phone }
                    });

                    if (response.data.success === true) {
                        countdown.value = 60;
                        timer = setInterval(() => {
                            countdown.value--;
                            if (countdown.value <= 0) {
                                clearInterval(timer);
                            }
                        }, 1000);
                        alert('验证码已发送');
                    } else {
                        alert(response.data.errorMsg || '发送失败');
                    }
                } catch (error) {
                    alert('发送验证码失败');
                }
            };

            const handleLogin = async () => {
                if (!loginForm.value.phone || !/^1[3-9]\d{9}$/.test(loginForm.value.phone)) {
                    alert('请输入正确的手机号');
                    return;
                }

                if (loginType.value === 'password' && !loginForm.value.password) {
                    alert('请输入密码');
                    return;
                }

                if (loginType.value === 'code' && !loginForm.value.code) {
                    alert('请输入验证码');
                    return;
                }

                try {
                    const params = new URLSearchParams();
                    params.append('phone', loginForm.value.phone);
                    params.append('loginType', loginType.value);
                    
                    if (loginType.value === 'password') {
                        params.append('password', loginForm.value.password);
                    } else {
                        params.append('code', loginForm.value.code);
                    }

                    const response = await axios.post('/login/login', params);
                    if (response.data.success === true) {
                        const data = response.data.data;
                        localStorage.setItem('token', data.token);
                        sessionStorage.setItem('user', JSON.stringify(data.user));
                        alert('登录成功');
                        window.location.href = 'main.html';
                    } else {
                        alert(response.data.errorMsg || '登录失败');
                    }
                } catch (error) {
                    alert('登录请求失败');
                    console.error(error);
                }
            };

            onMounted(() => {
                pageLoaded.value = true;
            });

            return {
                loginType,
                loginForm,
                countdown,
                pageLoaded,
                sendCode,
                handleLogin
            };
        }
    }).mount('#app');
</script>
</body>
</html>
